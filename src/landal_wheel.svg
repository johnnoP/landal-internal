  <g transform="rotate(279,320,360)"><rect x="313.5" y="175" width="13" height="41" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(288,320,360)"><rect x="316.5" y="175" width="7"  height="35" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(297,320,360)"><rect x="312.5" y="175" width="15" height="53" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(306,320,360)"><rect x="315.5" y="175" width="9"  height="30" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(315,320,360)"><rect x="314"   y="175" width="12" height="45" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(324,320,360)"><rect x="316.5" y="175" width="7"  height="37" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(333,320,360)"><rect x="314.5" y="175" width="11" height="22" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(342,320,360)"><rect x="313"   y="175" width="14" height="48" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(351,320,360)"><rect x="315"   y="175" width="10" height="33" fill="#00A8A8" rx="2"/></g>

  <!-- Pause bars — identical, centered on 320,360 -->
  <!-- center=320, gap=28, barW=52: left x=320-14-52=254, right x=320+14=334 -->
  <rect x="254" y="280" width="52" height="160" rx="4" fill="#00A8A8"/>
  <rect x="334" y="280" width="52" height="160" rx="4" fill="#00A8A8"/>
</g>
</svg>
