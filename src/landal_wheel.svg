  <g transform="rotate(198,320,360)"><rect x="314.5" y="175" width="11" height="23" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(207,320,360)"><rect x="312.5" y="175" width="15" height="43" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(216,320,360)"><rect x="315.5" y="175" width="9"  height="36" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(225,320,360)"><rect x="314"   y="175" width="12" height="50" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(234,320,360)"><rect x="316"   y="175" width="8"  height="28" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(243,320,360)"><rect x="314.5" y="175" width="11" height="44" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(252,320,360)"><rect x="313"   y="175" width="14" height="31" fill="#00A8A8" rx="2"/></g>
  <g transform="rotate(261,320,360)"><rect x="315"   y="175" width="10" height="49" fill="#00A8A8" rx="2"/></g>
